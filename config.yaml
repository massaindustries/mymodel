model:
  name: andreanardoni
  description: ciao
providers:
  regoloai:
    type: openai-compatible
    base_url: https://api.regolo.ai/v1
    api_key: ${REGOLO_API_KEY}
modality_routes:
  audio:
    provider: regoloai
    model: faster-whisper-large-v3
  image:
    provider: regoloai
    model: deepseek-ocr
  multimodal:
    provider: regoloai
    model: qwen3-vl-32b
text_routes:
  - name: default
    priority: 0
    operator: OR
    provider: regoloai
    model: gpt-oss-120b
plugins:
  pii_detection:
    enabled: false
    action: ''
  jailbreak_guard:
    enabled: false
    action: ''
  semantic_cache:
    enabled: false
    action: ''
server_port: 8000
