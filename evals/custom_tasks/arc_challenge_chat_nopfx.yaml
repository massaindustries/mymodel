tag:
  - llama
task: arc_challenge_chat_nopfx
dataset_path: allenai/ai2_arc
dataset_name: ARC-Challenge
output_type: generate_until
training_split: train
validation_split: validation
test_split: test
fewshot_split: train
doc_to_text: 'Given the following question and four candidate answers (A, B, C and D), choose the best answer.

  Question: {{question.strip()}}

  A. {{choices.text[0]}}

  B. {{choices.text[1]}}

  C. {{choices.text[2]}}{% if choices.text|length > 3 %}

  D. {{choices.text[3]}}{% endif %}

  Your response should end with "The best answer is [the_answer_letter]" where the [the_answer_letter] is one of A, B, C or D.'
fewshot_delimiter: "\n\n"
doc_to_target: "{{ 'ABCD'[answerKey|int - 1] if answerKey|string in '1234' else answerKey }}"
num_fewshot: 0
generation_kwargs:
  max_gen_toks: 256
  until:
    - "\n\nQuestion:"
    - "\n\nGiven"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
filter_list:
  - name: get_answer_letter
    filter:
      - function: regex
        regex_pattern: "(?:the answer is|best answer is)\\s*\\(?([A-Da-d])\\)?"
        group_select: 0
        fallback: "Z"
      - function: remove_whitespace
      - function: take_first
metadata:
  version: 1.0
